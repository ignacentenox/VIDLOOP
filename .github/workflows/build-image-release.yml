name: Build VIDLOOP Legacy Image Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v3.0.0-image1)"
        required: true
      release_name:
        description: "Release name"
        required: false
        default: "VIDLOOP Raspberry Pi Image"
      mark_latest:
        description: "Mark release as latest"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils unzip rsync kpartx util-linux coreutils

      - name: Build image
        run: |
          chmod +x image-kit/ci/build-release-image.sh
          image-kit/ci/build-release-image.sh

      - name: Collect artifacts
        id: collect
        run: |
          IMG_XZ=$(ls -1 dist/*.img.xz | head -n1)
          SHA=$(ls -1 dist/*.img.xz.sha256 | head -n1)
          echo "img_xz=$IMG_XZ" >> "$GITHUB_OUTPUT"
          echo "sha_file=$SHA" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          make_latest: ${{ github.event.inputs.mark_latest }}
          generate_release_notes: true
          files: |
            ${{ steps.collect.outputs.img_xz }}
            ${{ steps.collect.outputs.sha_file }}
